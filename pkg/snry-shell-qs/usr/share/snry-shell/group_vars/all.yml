---
# Snry Shell Ansible playbook

# XDG paths
xdg_bin_home: "{{ lookup('env', 'XDG_BIN_HOME') | default(ansible_user_dir ~ '/.local/bin', true) }}"
xdg_cache_home: "{{ lookup('env', 'XDG_CACHE_HOME') | default(ansible_user_dir ~ '/.cache', true) }}"
xdg_config_home: "{{ lookup('env', 'XDG_CONFIG_HOME') | default(ansible_user_dir ~ '/.config', true) }}"
xdg_data_home: "{{ lookup('env', 'XDG_DATA_HOME') | default(ansible_user_dir ~ '/.local/share', true) }}"
xdg_state_home: "{{ lookup('env', 'XDG_STATE_HOME') | default(ansible_user_dir ~ '/.local/state', true) }}"

# Snry Shell specific paths
backup_dir: "{{ lookup('env', 'BACKUP_DIR') | default(ansible_user_dir ~ '/ii-original-dots-backup', true) }}"
dots_confdir: "{{ xdg_config_home }}/snry-shell"
installed_listfile: "{{ dots_confdir }}/installed_listfile"
firstrun_file: "{{ dots_confdir }}/installed_true"
venv_path: "{{ xdg_state_home }}/quickshell/.venv"

# Install flags (default to false/empty for idempotent behavior)
skip_sysupdate: false
skip_plasmaintg: false
skip_backup: false
skip_quickshell: false
skip_hyprland: false
skip_hyprland_entry: false
skip_bash: false
skip_fontconfig: false
skip_miscconf: false
skip_allgreeting: false
skip_alldeps: false
skip_allsetups: false
skip_allfiles: false
ignore_outdate_check: false
firstrun: false
force: false

# Fontset option (empty = use default fontconfig)
fontset_dir_name: ""

# Repo root path
repo_root: "{{ playbook_dir }}"

# Arch packages (loaded from data/arch/packages.conf)
arch_packages:
  - cava
  - pavucontrol-qt
  - wireplumber
  - pipewire-pulse
  - libdbusmenu-gtk3
  - playerctl
  - geoclue
  - brightnessctl
  - ddcutil
  - bc
  - coreutils
  - cliphist
  - curl
  - wget
  - ripgrep
  - jq
  - xdg-user-dirs
  - rsync
  - go-yq
  - qt6-5compat
  - qt6-avif-image-plugin
  - qt6-imageformats
  - qt6-positioning
  - kirigami
  - kdialog
  - syntax-highlighting
  - bibata-cursor-theme-bin
  - adw-gtk-theme-git
  - breeze
  - breeze-plus
  - darkly-bin
  - eza
  - fzf
  - fontconfig
  - kitty
  - matugen-bin
  - otf-space-grotesk
  - starship
  - ttf-jetbrains-mono-nerd
  - ttf-material-symbols-variable-git
  - ttf-readex-pro
  - ttf-rubik-vf
  - ttf-twemoji
  - hyprland
  - hyprsunset
  - wl-clipboard
  - bluedevil
  - gnome-keyring
  - networkmanager
  - plasma-nm
  - polkit-kde-agent
  - dolphin
  - systemsettings
  - xdg-desktop-portal
  - xdg-desktop-portal-kde
  - xdg-desktop-portal-gtk
  - xdg-desktop-portal-hyprland
  - clang
  - uv
  - gtk4
  - libadwaita
  - libsoup3
  - libportal-gtk4
  - gobject-introspection
  - hyprshot
  - slurp
  - swappy
  - tesseract
  - tesseract-data-eng
  - wf-recorder
  - upower
  - wtype
  - fuzzel
  - glib2
  - go
  - imagemagick
  - hypridle

# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/
misc {
  vrr = 0
}

plugin {
  touch_gestures {
    sensitivity = 4.0
    workspace_swipe_fingers = 3
    workspace_swipe_edge = l
    long_press_delay = 400
    resize_on_border_long_press = true
    edge_margin = 10

    # Edge gestures
    hyprgrass-bind = , edge:d:u, global, quickshell:oskToggle
    hyprgrass-bind = , edge:u:d, killactive

    # 3-finger swipe
    hyprgrass-bind = , swipe:3:u, global, quickshell:overviewWorkspacesToggle
    hyprgrass-bind = , swipe:3:d, global, quickshell:sidebarRightToggle

    # 4-finger swipe
    hyprgrass-bind = , swipe:4:u, global, quickshell:overviewWorkspacesToggle
    hyprgrass-bind = , swipe:4:d, global, quickshell:overviewWorkspacesClose

    # Tap
    hyprgrass-bind = , tap:3, global, quickshell:searchToggleRelease

    # Pinch
    hyprgrass-bind = , pinch:3:i, global, quickshell:overviewWorkspacesToggle

    # Long press (mouse binds)
    hyprgrass-bindm = , longpress:2, movewindow
    hyprgrass-bindm = , longpress:3, resizewindow
  }
}

# snry-shell system entry point (legacy hyprlang format)
# This file lives at /usr/share/snry-shell/configs/hypr/hyprland.conf
# source= resolves relative to this file's directory for Layer 1.
# Layers 2-3 use absolute paths to ~/.config/hypr/.

# === Layer 1: System defaults (from /usr/share/snry-shell/configs/hypr/) ===
source=hyprland/variables.conf
source=hyprland/env.conf

# --- Defaults ---
# hyprlang if !dontLoadDefaultExecs
source=hyprland/execs.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultGeneral
source=hyprland/general.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultRules
source=hyprland/rules.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultColors
source=hyprland/colors.conf
# hyprlang endif
# hyprlang if !dontLoadDefaultKeybinds
source=hyprland/keybinds.conf
# hyprlang endif

# === Layer 2: Auto-generated configuration ===
# hyprlang noerror true
source=~/.config/hypr/monitors.lua
# hyprlang noerror true
source=~/.config/hypr/workspaces.lua

# === Layer 3: User overrides — loaded LAST so they override everything ===
# Place your overrides in ~/.config/hypr/snry-override.lua (or .conf)
# hyprlang noerror true
source=~/.config/hypr/snry-override.conf
source=~/.config/hypr/snry-override.lua
# hyprlang noerror false

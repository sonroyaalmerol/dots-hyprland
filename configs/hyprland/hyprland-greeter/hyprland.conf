# Minimal Hyprland config for the display manager greeter.
# This runs as the snry-dm system user and only needs basic rendering.

monitor=,preferred,0x0,1

input {
    kb_layout=us
    follow_mouse=1
}

general {
    border_size=0
    gaps_in=0
    gaps_out=0
    col.active_border=0x00000000
    col.inactive_border=0x00000000
}

decoration {
    rounding=0
    blur {
        enabled=false
    }
    drop_shadow=false
}

animations {
    enabled=false
}

misc {
    disable_hyprland_logo=true
    disable_splash_rendering=true
    mouse_move_enables_dpms=true
    key_press_enables_dpms=true
}

# No keybinds, no layouts, no window rules — kiosk mode.

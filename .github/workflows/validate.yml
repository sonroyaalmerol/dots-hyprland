name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install Ansible collections
        run: ansible-galaxy collection install community.general ansible.posix

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml, glob, sys
          files = ['setup.yml', 'group_vars/all.yml'] + glob.glob('roles/*/tasks/*.yml')
          errors = []
          for f in files:
            try:
              yaml.safe_load(open(f))
            except Exception as e:
              errors.append(f'{f}: {e}')
          if errors:
            for e in errors: print(e)
            sys.exit(1)
          print(f'All {len(files)} YAML files valid')
          "

      - name: Validate playbook syntax
        run: ansible-playbook setup.yml --syntax-check

      - name: Lint PKGBUILD
        run: |
          # Basic PKGBUILD validation
          bash -n PKGBUILD
          source PKGBUILD
          echo "Package: $pkgname $pkgver-$pkgrel"

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  pkgbuild:
    name: PKGBUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PKGBUILD shell syntax
        run: bash -n PKGBUILD

      - name: Validate install script shell syntax
        run: bash -n snry-shell-qs.install

      - name: Check PKGBUILD variables
        run: |
          source PKGBUILD
          echo "Package: $pkgname $pkgver-$pkgrel"
          echo "Arch: ${arch[*]}"
          echo "Depends: ${#depends[@]} packages"
          echo "Make depends: ${makedepends[*]}"

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not formatted:"
            echo "$out"
            exit 1
          fi
          echo "All files formatted correctly"

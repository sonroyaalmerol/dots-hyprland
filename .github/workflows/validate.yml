name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libevdev-dev libwayland-dev

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libevdev-dev libwayland-dev

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install CGo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libevdev-dev libwayland-dev

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  pkgbuild:
    name: PKGBUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PKGBUILD shell syntax
        run: bash -n PKGBUILD

      - name: Validate install script shell syntax
        run: bash -n snry-shell-qs.install

      - name: Check PKGBUILD variables
        run: |
          source PKGBUILD
          echo "Package: $pkgname $pkgver-$pkgrel"
          echo "Arch: ${arch[*]}"
          echo "Depends: ${#depends[@]} packages"
          echo "Make depends: ${makedepends[*]}"

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not formatted:"
            echo "$out"
            exit 1
          fi
          echo "All files formatted correctly"

  integration:
    name: DM Integration (PAM)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm go pam base-devel git

      - name: Create PAM config for snry-dm
        run: |
          cp configs/pam/snry-dm /etc/pam.d/snry-dm
          # Fallback: create minimal config if the shipped one references
          # modules not available in the container (e.g. pam_systemd.so).
          cat > /etc/pam.d/snry-dm <<'PAM'
          auth        required    pam_unix.so
          account     required    pam_unix.so
          session     required    pam_unix.so
          PAM

      - name: Create test user
        run: |
          useradd -m -s /bin/bash dmtest
          echo 'dmtest:testpass123' | chpasswd

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: go test -race -count=1 ./internal/dm/

      - name: Run integration tests
        run: go test -tags=integration -count=1 -v ./internal/dm/integration/

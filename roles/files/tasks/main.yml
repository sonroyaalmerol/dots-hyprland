---
# Files role - Copy config files

- name: Check if Fedora
  ansible.builtin.set_fact:
    is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"

- name: Check if firstrun
  ansible.builtin.stat:
    path: "{{ firstrun_file }}"
  register: firstrun_stat

- name: Set firstrun fact
  ansible.builtin.set_fact:
    is_firstrun: "{{ firstrun_stat.stat.exists }}"

- name: Create XDG directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_bin_home }}"
    - "{{ xdg_cache_home }}"
    - "{{ xdg_config_home }}"
    - "{{ xdg_data_home }}"

- name: Create backup directory for clashing configs
  ansible.builtin.file:
    path: "{{ backup_dir }}/.config"
    state: directory
    mode: "0755"
  when: not skip_backup | bool

- name: Create backup directory for local share
  ansible.builtin.file:
    path: "{{ backup_dir }}/.local/share"
    state: directory
    mode: "0755"
  when: not skip_backup | bool

- name: Backup clashing config files
  ansible.builtin.command:
    cmd: "rsync -av --include='{{ item }}' --exclude='*' {{ xdg_config_home }}/ {{ backup_dir }}/.config/"
  loop:
    - quickshell/
    - bash/
    - fontconfig/
    - hypr/
  when: not skip_backup | bool
  failed_when: false

- name: Create snry-shell config directory
  ansible.builtin.file:
    path: "{{ dots_confdir }}"
    state: directory
    mode: "0755"

- name: Ensure installed listfile directory exists
  ansible.builtin.file:
    path: "{{ installed_listfile | dirname }}"
    state: directory
    mode: "0755"

# MISC configs (dots/.config/* except quickshell, bash, hypr, fontconfig)
- name: Copy MISC config directories
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/{{ item }}/"
    dest: "{{ xdg_config_home }}/{{ item }}/"
    delete: true
    recursive: true
  loop: "{{ qgs_misc_configs }}"
  when:
    - not skip_miscconf | bool
    - not skip_quickshell | bool or item != 'quickshell'
  vars:
    qgs_misc_configs:
      - fuzzel
      - wlogout
  register: misc_sync_results

- name: Sync Konsole config
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.local/share/konsole/"
    dest: "{{ xdg_data_home }}/konsole/"
    delete: true
    recursive: true
  when: not skip_miscconf | bool

# Quickshell
- name: Sync Quickshell config
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/quickshell/"
    dest: "{{ xdg_config_home }}/quickshell/"
    delete: true
    recursive: true
  when: not skip_quickshell | bool

# snry-daemon
- name: Check if snry-daemon source exists
  ansible.builtin.stat:
    path: "{{ repo_root }}/scripts/snry-daemon/main.go"
  register: snry_daemon_src

- name: Build snry-daemon binary from source
  ansible.builtin.command:
    cmd: go build -o snry-daemon .
    chdir: "{{ repo_root }}/scripts/snry-daemon"
    creates: "{{ repo_root }}/scripts/snry-daemon/snry-daemon"
  when:
    - not skip_quickshell | bool
    - snry_daemon_src.stat.exists

- name: Install snry-daemon binary (built from source)
  ansible.builtin.copy:
    src: "{{ repo_root }}/scripts/snry-daemon/snry-daemon"
    dest: "{{ xdg_bin_home }}/snry-daemon"
    mode: "0755"
  when:
    - not skip_quickshell | bool
    - snry_daemon_src.stat.exists

- name: Install snry-daemon binary (from package)
  ansible.builtin.copy:
    src: "/usr/share/snry-shell/scripts/snry-daemon/snry-daemon"
    dest: "{{ xdg_bin_home }}/snry-daemon"
    mode: "0755"
  when:
    - not skip_quickshell | bool
    - not snry_daemon_src.stat.exists

# hyprgrass plugin
- name: Create hyprgrass plugin directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/lib/hyprland/plugins"
    state: directory
    mode: "0755"

- name: Check if hyprgrass plugin exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/lib/hyprland/plugins/libhyprgrass.so"
  register: hyprgrass_plugin_stat

- name: Clone hyprgrass repository
  ansible.builtin.git:
    repo: https://github.com/horriblename/hyprgrass.git
    dest: "{{ xdg_cache_home }}/snry-shell/hyprgrass"
    depth: 1
    update: false
  when:
    - not skip_hyprland | bool
    - not hyprgrass_plugin_stat.stat.exists

- name: Initialize hyprgrass submodules
  ansible.builtin.command:
    cmd: git submodule update --init --recursive
    chdir: "{{ xdg_cache_home }}/snry-shell/hyprgrass"
  when:
    - not skip_hyprland | bool
    - not hyprgrass_plugin_stat.stat.exists

- name: Setup hyprgrass with meson
  ansible.builtin.command:
    cmd: >-
      meson setup build
      --prefix={{ ansible_facts['user_dir'] }}/.local
      -Dhyprgrass=true
    chdir: "{{ xdg_cache_home }}/snry-shell/hyprgrass"
    env:
      HYPRLAND_HEADERS: /usr/include
    creates: "{{ xdg_cache_home }}/snry-shell/hyprgrass/build"
  when:
    - not skip_hyprland | bool
    - not hyprgrass_plugin_stat.stat.exists

- name: Build hyprgrass with ninja
  ansible.builtin.command:
    cmd: ninja -C build
    chdir: "{{ xdg_cache_home }}/snry-shell/hyprgrass"
    creates: "{{ xdg_cache_home }}/snry-shell/hyprgrass/build/src/libhyprgrass.so"
  when:
    - not skip_hyprland | bool
    - not hyprgrass_plugin_stat.stat.exists

- name: Install hyprgrass plugin
  ansible.builtin.copy:
    src: "{{ xdg_cache_home }}/snry-shell/hyprgrass/build/src/libhyprgrass.so"
    dest: "{{ ansible_facts['user_dir'] }}/.local/lib/hyprland/plugins/libhyprgrass.so"
    mode: "0755"
    backup: true
  when:
    - not skip_hyprland | bool
    - not hyprgrass_plugin_stat.stat.exists

# Bash
- name: Sync Bash config
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/bash/"
    dest: "{{ xdg_config_home }}/bash/"
    delete: true
    recursive: true
  when: not skip_bash | bool

- name: Install .bashrc
  ansible.builtin.copy:
    src: "{{ xdg_config_home }}/bash/bashrc"
    dest: "{{ ansible_facts['user_dir'] }}/.bashrc"
    mode: "0644"
    backup: true
  when: not skip_bash | bool

- name: Set zsh as default shell
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    shell: /usr/bin/zsh
  become: true
  when: not skip_bash | bool

- name: Install .bash_profile
  ansible.builtin.copy:
    src: "{{ xdg_config_home }}/bash/bash_profile"
    dest: "{{ ansible_facts['user_dir'] }}/.bash_profile"
    mode: "0644"
    backup: true
  when: not skip_bash | bool

- name: Install .zprofile
  ansible.builtin.copy:
    src: "{{ xdg_config_home }}/bash/zprofile"
    dest: "{{ ansible_facts['user_dir'] }}/.zprofile"
    mode: "0644"
    backup: true
  when: not skip_bash | bool

- name: Install .inputrc
  ansible.builtin.copy:
    src: "{{ xdg_config_home }}/bash/inputrc"
    dest: "{{ ansible_facts['user_dir'] }}/.inputrc"
    mode: "0644"
    backup: true
  when: not skip_bash | bool

# Fontconfig
- name: Sync default fontconfig
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/fontconfig/"
    dest: "{{ xdg_config_home }}/fontconfig/"
    delete: true
    recursive: true
  when:
    - not skip_fontconfig | bool
    - fontset_dir_name | length == 0

- name: Sync custom fontset
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files-extra/fontsets/{{ fontset_dir_name }}/"
    dest: "{{ xdg_config_home }}/fontconfig/"
    delete: true
    recursive: true
  when:
    - not skip_fontconfig | bool
    - fontset_dir_name | length > 0

# Hyprland
- name: Sync Hyprland config
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/hypr/hyprland/"
    dest: "{{ xdg_config_home }}/hypr/hyprland/"
    delete: true
    recursive: true
  when: not skip_hyprland | bool

- name: Check if hyprlock.conf exists
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/hypr/hyprlock.conf"
  register: hyprlock_conf_stat
  when: not skip_hyprland | bool

- name: Backup and install hyprlock.conf
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/hyprlock.conf"
    dest: "{{ xdg_config_home }}/hypr/hyprlock.conf"
    mode: "0644"
    backup: true
  when:
    - not skip_hyprland | bool
    - (not is_firstrun) or (not hyprlock_conf_stat.stat.exists) or (force | bool)

- name: Check if monitors.conf exists
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/hypr/monitors.conf"
  register: monitors_conf_stat

- name: Install monitors.conf (skip if already exists)
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/monitors.conf"
    dest: "{{ xdg_config_home }}/hypr/monitors.conf"
    mode: "0644"
  when:
    - not skip_hyprland | bool
    - (not is_firstrun) or (not monitors_conf_stat.stat.exists) or (force | bool)

- name: Check if workspaces.conf exists
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/hypr/workspaces.conf"
  register: workspaces_conf_stat

- name: Install workspaces.conf (skip if already exists)
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/workspaces.conf"
    dest: "{{ xdg_config_home }}/hypr/workspaces.conf"
    mode: "0644"
  when:
    - not skip_hyprland | bool
    - (not is_firstrun) or (not workspaces_conf_stat.stat.exists) or (force | bool)

- name: Check if hyprland.conf exists
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/hypr/hyprland.conf"
  register: hyprland_conf_stat
  when:
    - not skip_hyprland | bool
    - not skip_hyprland_entry | bool

- name: Install hyprland.conf
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/hyprland.conf"
    dest: "{{ xdg_config_home }}/hypr/hyprland.conf"
    mode: "0644"
  when:
    - not skip_hyprland | bool
    - not skip_hyprland_entry | bool
    - (not is_firstrun) or (not hyprland_conf_stat.stat.exists) or (force | bool)

- name: Check if hypridle.conf exists
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/hypr/hypridle.conf"
  register: hypridle_conf_stat
  when: not skip_hyprland | bool

- name: Backup and install hypridle.conf
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/hypridle.conf"
    dest: "{{ xdg_config_home }}/hypr/hypridle.conf"
    mode: "0644"
    backup: true
  when:
    - not skip_hyprland | bool
    - (not is_firstrun) or (not hypridle_conf_stat.stat.exists) or (force | bool)

- name: Append polkit exec for Fedora
  ansible.builtin.lineinfile:
    path: "{{ xdg_config_home }}/hypr/hyprland/execs.conf"
    line: "# For fedora to setup polkit\nexec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1\n"
    state: present
  when:
    - is_fedora | bool
    - not skip_hyprland | bool

- name: Install custom directory (skip if exists)
  ansible.builtin.synchronize:
    src: "{{ repo_root }}/files/.config/hypr/custom/"
    dest: "{{ xdg_config_home }}/hypr/custom/"
    delete: false
    recursive: true
  when:
    - not skip_hyprland | bool
    - (not is_firstrun) or (force | bool)

# Icon
- name: Install snry-shell icon
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.local/share/icons/snry-shell.svg"
    dest: "{{ xdg_data_home }}/icons/snry-shell.svg"
    mode: "0644"

# Google Sans Flex (non-Fedora)
- name: Check if Google Sans Flex font exists
  ansible.builtin.command:
    cmd: "fc-list | grep -qi 'Google Sans Flex'"
  register: google_sans_check
  failed_when: false
  changed_when: false

- name: Clone Google Sans Flex repo
  ansible.builtin.git:
    repo: https://github.com/end-4/google-sans-flex
    dest: "{{ xdg_cache_home }}/snry-shell/google-sans-flex"
    depth: 1
  when:
    - not is_fedora | bool
    - google_sans_check.rc != 0

- name: Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/fonts"
    state: directory
    mode: "0755"
  when:
    - not is_fedora | bool
    - google_sans_check.rc != 0

- name: Install Google Sans Flex font
  ansible.builtin.command:
    cmd: "rsync -a {{ xdg_cache_home }}/snry-shell/google-sans-flex/ {{ xdg_data_home }}/fonts/snry-shell-google-sans-flex/"
  when:
    - not is_fedora | bool
    - google_sans_check.rc != 0

- name: Refresh font cache
  ansible.builtin.command:
    cmd: fc-cache -fv
  when: not is_fedora | bool

# Mark firstrun
- name: Create firstrun marker
  ansible.builtin.file:
    path: "{{ firstrun_file }}"
    state: touch
    mode: "0644"

- name: Track firstrun file in listfile
  ansible.builtin.lineinfile:
    path: "{{ installed_listfile }}"
    line: "{{ firstrun_file }}"
    state: present
    create: true
    mode: "0644"

# Reload hyprland
- name: Reload Hyprland
  ansible.builtin.command:
    cmd: hyprctl reload
  failed_when: false

# Start Quickshell if not running
- name: Check if Quickshell is running
  ansible.builtin.command: pidof qs
  register: qs_check
  failed_when: false
  changed_when: false

- name: Start Quickshell
  ansible.builtin.shell:
    cmd: qs -c ii &
  async: 5
  poll: 0
  when: qs_check.rc != 0

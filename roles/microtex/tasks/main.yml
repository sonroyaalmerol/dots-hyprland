---
# MicroTeX build from local PKGBUILD

- name: Check if Arch-based
  ansible.builtin.set_fact:
    is_arch: "{{ ansible_facts['distribution'] in ['Arch Linux', 'CachyOS'] or ansible_facts['os_family'] == 'Archlinux' }}"

- name: Check if MicroTeX is already installed
  ansible.builtin.command: which LaTeX
  register: microtex_check
  failed_when: false
  changed_when: false

- name: Build and install MicroTeX via makepkg
  ansible.builtin.command:
    cmd: makepkg -si --noconfirm --needed
    chdir: "{{ repo_root }}/data/arch/microtex-git"
  when:
    - is_arch | bool
    - microtex_check.rc != 0

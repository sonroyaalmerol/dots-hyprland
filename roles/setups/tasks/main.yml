---
# Setups role - System setup tasks

- name: Capture the real login user
  ansible.builtin.set_fact:
    real_user: "{{ lookup('env', 'USER') }}"

- name: Check if Arch-based
  ansible.builtin.set_fact:
    is_arch: "{{ ansible_facts['distribution'] in ['Arch Linux', 'CachyOS'] or ansible_facts['os_family'] == 'Archlinux' }}"

- name: Check if Fedora
  ansible.builtin.set_fact:
    is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"

- name: Create i2c group (Arch only)
  ansible.builtin.group:
    name: i2c
    state: present
  become: true
  when: is_arch | bool

- name: Add user to video, input groups
  ansible.builtin.user:
    name: "{{ real_user }}"
    groups: video,input
    append: true
  become: true

- name: Add user to i2c group (Arch only)
  ansible.builtin.user:
    name: "{{ real_user }}"
    groups: i2c
    append: true
  become: true
  when: is_arch | bool

- name: Create i2c-dev module config (Arch only)
  ansible.builtin.copy:
    dest: /etc/modules-load.d/i2c-dev.conf
    content: "i2c-dev\n"
    mode: "0644"
  become: true
  when: is_arch | bool

- name: Create uinput module config (Fedora only)
  ansible.builtin.copy:
    dest: /etc/modules-load.d/uinput.conf
    content: "uinput\n"
    mode: "0644"
  become: true
  when: is_fedora | bool

- name: Create udev rules for uinput (Fedora only)
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-uinput.rules
    content: 'SUBSYSTEM=="misc", KERNEL=="uinput", MODE="0660", GROUP="input"\n'
    mode: "0644"
  become: true
  when: is_fedora | bool

- name: Enable bluetooth service
  ansible.builtin.systemd:
    name: bluetooth
    state: started
    enabled: true
  become: true

- name: Set font-name gsetting
  ansible.builtin.command:
    cmd: "gsettings set org.gnome.desktop.interface font-name 'Google Sans Flex Medium 11 @opsz=11,wght=500'"

- name: Set color-scheme gsetting
  ansible.builtin.command:
    cmd: "gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'"

- name: Set widgetStyle via kwriteconfig6
  ansible.builtin.command:
    cmd: "kwriteconfig6 --file kdeglobals --group KDE --key widgetStyle Darkly"

- name: Create logind.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    mode: "0755"
  become: true

- name: Deploy logind drop-in configuration
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/hypr/custom/logind.conf"
    dest: /etc/systemd/logind.conf.d/override.conf
    mode: "0644"
    backup: true
  become: true

- name: Ensure .zprofile exists before disabling display managers
  ansible.builtin.copy:
    src: "{{ repo_root }}/files/.config/bash/zprofile"
    dest: "{{ ansible_facts['user_dir'] }}/.zprofile"
    mode: "0644"
    backup: true
  when: not skip_bash | bool

# ── Disable display managers ──

- name: Disable GDM service
  ansible.builtin.systemd:
    name: gdm
    enabled: false
    state: stopped
  become: true
  failed_when: false

- name: Disable SDDM service
  ansible.builtin.systemd:
    name: sddm
    enabled: false
    state: stopped
  become: true
  failed_when: false

- name: Disable LightDM service
  ansible.builtin.systemd:
    name: lightdm
    enabled: false
    state: stopped
  become: true
  failed_when: false

- name: Disable display-manager.service alias
  ansible.builtin.systemd:
    name: display-manager
    enabled: false
    state: stopped
  become: true
  failed_when: false

# ── TTY autologin ──

- name: Create getty@tty1 override directory
  ansible.builtin.file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory
    mode: "0755"
  become: true

- name: Deploy getty@tty1 autologin override
  ansible.builtin.copy:
    dest: /etc/systemd/system/getty@tty1.service.d/override.conf
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --noissue --nohostname --noclear --autologin {{ real_user }} %I $TERM
    mode: "0644"
  become: true

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Create .hushlogin to suppress last-login messages
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.hushlogin"
    state: touch
    mode: "0644"

- name: Ensure snry-shell lock-on-startup is enabled
  ansible.builtin.shell: |
    mkdir -p "$HOME/.config/snry-shell"
    config_file="$HOME/.config/snry-shell/config.json"
    if [ -f "$config_file" ] && command -v jq >/dev/null 2>&1; then
      jq '.lock.launchOnStartup = true' "$config_file" > "${config_file}.tmp" && mv "${config_file}.tmp" "$config_file"
    else
      echo '{"lock":{"launchOnStartup":true}}' > "$config_file"
    fi
  changed_when: true

# ── PAM gnome-keyring integration for TTY login ──

- name: Add pam_gnome_keyring to PAM login auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/login
    line: "auth       optional   pam_gnome_keyring.so"
    insertafter: "^auth.*include.*system-local-login"
    state: present
  become: true

- name: Add pam_gnome_keyring to PAM login session
  ansible.builtin.lineinfile:
    path: /etc/pam.d/login
    line: "session    optional   pam_gnome_keyring.so auto_start"
    insertafter: "^session.*include.*system-local-login"
    state: present
  become: true

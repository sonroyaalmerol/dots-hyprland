---
# deps role - Install dependencies for Arch or Fedora

- name: Check if Arch-based
  ansible.builtin.set_fact:
    is_arch: "{{ ansible_facts['distribution'] in ['Arch Linux', 'CachyOS'] or ansible_facts['os_family'] == 'Archlinux' }}"

- name: Check if Fedora
  ansible.builtin.set_fact:
    is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"

- name: Include Arch deps
  ansible.builtin.import_tasks: arch.yml
  when: is_arch | bool

- name: Include Fedora deps
  ansible.builtin.import_tasks: fedora.yml
  when: is_fedora | bool

- name: Fail if distro not supported
  ansible.builtin.fail:
    msg: "Distribution {{ ansible_facts['distribution'] }} is not supported. Only Arch Linux, CachyOS, and Fedora are supported."
  when: not is_arch and not is_fedora

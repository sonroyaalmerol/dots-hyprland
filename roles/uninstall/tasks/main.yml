---
# Uninstall role - Remove installed files and revert changes

- name: Check if installed listfile exists
  ansible.builtin.stat:
    path: "{{ installed_listfile }}"
  register: listfile_stat

- name: Read installed files list
  ansible.builtin.command:
    cmd: "cat {{ installed_listfile }}"
  register: installed_files
  when: listfile_stat.stat.exists

- name: Check if Arch-based
  ansible.builtin.set_fact:
    is_arch: "{{ ansible_facts['distribution'] in ['Arch Linux', 'CachyOS'] or ansible_facts['os_family'] == 'Archlinux' }}"

- name: Check if Fedora
  ansible.builtin.set_fact:
    is_fedora: "{{ ansible_facts['distribution'] == 'Fedora' }}"

- name: Delete installed files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ installed_files.stdout_lines }}"
  when: listfile_stat.stat.exists
  ignore_errors: true

- name: Create empty dir list file
  ansible.builtin.tempfile:
    state: file
    suffix: .txt
  register: empty_dir_file

- name: Find empty directories in config home
  ansible.builtin.find:
    path: "{{ xdg_config_home }}"
    file_type: directory
    recurse: false
    use_regex: false
    age: 0
  register: empty_config_dirs

- name: Find empty directories in data home
  ansible.builtin.find:
    path: "{{ xdg_data_home }}/konsole"
    file_type: directory
    recurse: true
    use_regex: false
    age: 0
  register: empty_konsole_dirs
  failed_when: false

- name: Remove user from video group
  ansible.builtin.command:
    cmd: "gpasswd -d {{ ansible_facts.user_id }} video"
  become: true
  failed_when: false

- name: Remove user from i2c group (Arch only)
  ansible.builtin.command:
    cmd: "gpasswd -d {{ ansible_facts.user_id }} i2c"
  become: true
  failed_when: false
  when: is_arch | bool

- name: Remove user from input group
  ansible.builtin.command:
    cmd: "gpasswd -d {{ ansible_facts.user_id }} input"
  become: true
  failed_when: false

- name: Remove i2c-dev module config
  ansible.builtin.file:
    path: /etc/modules-load.d/i2c-dev.conf
    state: absent
  become: true
  when: is_arch | bool

- name: Clean up temp file
  ansible.builtin.file:
    path: "{{ empty_dir_file.path }}"
    state: absent
  when: empty_dir_file.path is defined

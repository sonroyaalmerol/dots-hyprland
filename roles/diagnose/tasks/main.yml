---
# Diagnose role - Collect system info

- name: Remove existing diagnose result file
  ansible.builtin.file:
    path: "{{ repo_root }}/diagnose.result"
    state: absent

- name: Collect git remote URL
  ansible.builtin.command:
    cmd: git remote get-url origin
  args:
    chdir: "{{ repo_root }}"
  register: git_remote
  changed_when: false

- name: Collect git HEAD
  ansible.builtin.command:
    cmd: git rev-parse HEAD
  args:
    chdir: "{{ repo_root }}"
  register: git_head
  changed_when: false

- name: Collect git status
  ansible.builtin.command:
    cmd: git status
  args:
    chdir: "{{ repo_root }}"
  register: git_status
  changed_when: false

- name: Collect git submodule status
  ansible.builtin.command:
    cmd: git submodule status --recursive
  args:
    chdir: "{{ repo_root }}"
  register: git_submodules
  changed_when: false

- name: Get distro ID
  ansible.builtin.shell:
    cmd: awk -F= '/^ID=/ { gsub(/"/, "", $2); print tolower($2) }' /etc/os-release
  register: distro_id
  changed_when: false

- name: Get distro ID like
  ansible.builtin.shell:
    cmd: awk -F= '/^ID_LIKE=/ { gsub(/"/, "", $2); print tolower($2) }' /etc/os-release
  register: distro_id_like
  changed_when: false

- name: Get os-release content
  ansible.builtin.command:
    cmd: cat /etc/os-release
  register: os_release
  changed_when: false

- name: Check venv directory
  ansible.builtin.stat:
    path: "{{ venv_path }}"
  register: venv_stat

- name: Get Hyprland version
  ansible.builtin.command:
    cmd: Hyprland --version
  register: hyprland_version
  changed_when: false
  failed_when: false

- name: Get quickshell version
  ansible.builtin.command:
    cmd: pacman -Q | grep -E 'quickshell|qt6-base'
  register: quickshell_version
  changed_when: false
  failed_when: false

- name: Get MicroTeX version
  ansible.builtin.command:
    cmd: pacman -Q | grep -E 'snry-shell-microtex-git'
  register: microtex_version
  changed_when: false
  failed_when: false

- name: Write diagnose results to file
  ansible.builtin.copy:
    dest: "{{ repo_root }}/diagnose.result"
    content: |
      ========================================
      Git Repo Info
      ========================================
      Remote URL: {{ git_remote.stdout }}
      HEAD: {{ git_head.stdout }}
      Status:
      {{ git_status.stdout }}
      Submodules:
      {{ git_submodules.stdout }}

      ========================================
      Distro Info
      ========================================
      Distro ID: {{ distro_id.stdout }}
      Distro ID_LIKE: {{ distro_id_like.stdout }}
      /etc/os-release:
      {{ os_release.stdout }}

      ========================================
      XDG Variables
      ========================================
      XDG_CACHE_HOME: {{ xdg_cache_home }}
      XDG_CONFIG_HOME: {{ xdg_config_home }}
      XDG_DATA_HOME: {{ xdg_data_home }}
      XDG_STATE_HOME: {{ xdg_state_home }}
      SNRY_SHELL_VIRTUAL_ENV: {{ venv_path }}

      ========================================
      Venv Status
      ========================================
      {{ venv_path }} exists: {{ venv_stat.stat.exists }}

      ========================================
      Version Info
      ========================================
      {{ hyprland_version.stdout }}
      {{ quickshell_version.stdout }}
      {{ microtex_version.stdout }}
    mode: "0644"

- name: Display diagnose results
  ansible.builtin.command:
    cmd: cat {{ repo_root }}/diagnose.result
  changed_when: false
